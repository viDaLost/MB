<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#090a0d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nocturne & Shelter" />
    <meta
      name="description"
      content="Две атмосферные социальные игры для компании: Мафия и Бункер."
    />
    <link rel="icon" href="%BASE_URL%icons/favicon.ico" sizes="any" />
    <link rel="icon" href="%BASE_URL%icons/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="%BASE_URL%icons/favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" sizes="180x180" />
    <title>Ночной город / Последний бункер</title>
    <script>
      const standalone =
        window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true
          ? 'true'
          : 'false';
      document.documentElement.dataset.standalone = standalone;
      document.addEventListener('DOMContentLoaded', () => {
        document.body.dataset.standalone = standalone;
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
